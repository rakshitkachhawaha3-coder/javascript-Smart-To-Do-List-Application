<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    

   <div class="container">

    <h1>📝 TaskFlow</h1>

    <p class="subtitle">
        Organize your tasks efficiently
    </p>

    <div class="input-section">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter a new task..."
        >

        <button id="addBtn">
            ➕ Add Task
        </button>

    </div>

    <ul id="taskList">

        

    </ul>

    <div class="filters">

        <button class="filter active">
            All
        </button>

        <button class="filter">
            Completed
        </button>

        <button class="filter">
            Pending
        </button>

    </div>

</div>
<script src="script.js"></script>
</body>
</html>
